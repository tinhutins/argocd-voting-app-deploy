apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vote-test-ingress
  namespace: vote
  labels:
    app: vote
spec:
  # Application Gateway (enable_appgw = true in terraform)
  ingressClassName: azure-application-gateway
  # Traefik (enable_appgw = false) — swap annotation + ingressClassName:
  # ingressClassName: traefik
  rules:
  - host: "vote-test.riftdevops.com"
    http:
      paths:
      - pathType: Prefix
        path: /
        backend:
          service:
            name: vote
            port:
              number: 5000
