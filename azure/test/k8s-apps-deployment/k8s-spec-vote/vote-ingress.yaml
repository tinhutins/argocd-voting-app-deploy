apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vote-test-ingress
  namespace: vote
  labels:
    app: vote
  annotations:
    # Uncomment for Application Gateway ingress (enable_appgw = true in terraform)
    kubernetes.io/ingress.class: azure/application-gateway
    # Uncomment for Traefik ingress (enable_appgw = false in terraform)
    # traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  # Application Gateway
  ingressClassName: azure/application-gateway
  # Traefik
  # ingressClassName: traefik
  rules:
  - host: "vote-test.riftdevops.com"
    http:
      paths:
      - pathType: Prefix
        path: /
        backend:
          service:
            name: vote
            port:
              number: 5000
