apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: result-test-ingress
  namespace: vote
  labels:
    app: result
spec:
  # Application Gateway (enable_appgw = true in terraform)
  ingressClassName: azure-application-gateway
  # Traefik (enable_appgw = false) — swap ingressClassName:
  # ingressClassName: traefik
  rules:
  - host: "result-test.riftdevops.com"
    http:
      paths:
      - pathType: Prefix
        path: /
        backend:
          service:
            name: result
            port:
              number: 5001
