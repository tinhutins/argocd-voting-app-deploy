apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: result-test-ingress
  namespace: vote
  labels:
    app: result
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
  - host: "result-test.riftdevops.com"
    http:
      paths:
      - pathType: Prefix
        path: /
        backend:
          service:
            name: result
            port:
              number: 5001
