apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: result-test-ingress
  namespace: vote
  labels:
    app: result
  annotations:
    # Application Gateway ingress (enable_appgw = true in terraform)
    kubernetes.io/ingress.class: azure/application-gateway
    # Traefik ingress (enable_appgw = false in terraform)
    # traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  # Application Gateway — IngressClass name registered by the managed AGIC add-on
  ingressClassName: azure-application-gateway
  # Traefik
  # ingressClassName: traefik
  rules:
  - host: "result-test.riftdevops.com"
    http:
      paths:
      - pathType: Prefix
        path: /
        backend:
          service:
            name: result
            port:
              number: 5001
