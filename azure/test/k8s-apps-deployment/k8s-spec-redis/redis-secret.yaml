apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redis-credentials
  namespace: vote
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv-cluster-store
    kind: ClusterSecretStore
  target:
    name: redis-credentials
    template:
      type: Opaque
      data:
        REDIS_PASSWORD: "{{ .redis_primary_key }}"
  data:
    - secretKey: redis_primary_key
      remoteRef:
        key: redis-primary-key
