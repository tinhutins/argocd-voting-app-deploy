apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: vote
spec:
  type: ExternalName
  # UPDATE after Step 3 — replace with Azure Cache for Redis hostname
  # e.g. riftdevops-test-redis.redis.cache.windows.net
  # NOTE: Azure Redis uses port 6380 (SSL) by default. If the app connects
  # without TLS, enable non-SSL port (6379) in the Azure Redis settings.
  externalName: riftdevops-test-redis.redis.cache.windows.net
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
