apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: vote
type: Opaque
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "123PasswordPostgresql"
  POSTGRES_DB: "postgres"

  # UPDATE after Step 3 (terraform/azure/test) — replace <PGHOST> with the
  # Azure Flexible Server FQDN (e.g. riftdevops-test-pg.postgres.database.azure.com)
  DATABASE_URL: "postgres://postgres:123PasswordPostgresql@riftdevops-test-pg.postgres.database.azure.com:5432/postgres?sslmode=require"
  JDBC_URL: "jdbc:postgresql://riftdevops-test-pg.postgres.database.azure.com:5432/postgres?sslmode=require"
