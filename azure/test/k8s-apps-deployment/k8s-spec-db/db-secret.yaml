apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: vote
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv-cluster-store
    kind: ClusterSecretStore
  target:
    name: db-credentials
    template:
      type: Opaque
      data:
        POSTGRES_USER: "postgres"
        POSTGRES_DB: "postgres"
        POSTGRES_PASSWORD: "{{ .postgres_password }}"
        DATABASE_URL: "postgres://postgres:{{ .postgres_password }}@riftdevops-test-pg.postgres.database.azure.com:5432/postgres?sslmode=require"
        JDBC_URL: "jdbc:postgresql://riftdevops-test-pg.postgres.database.azure.com:5432/postgres?sslmode=require"
  data:
    - secretKey: postgres_password
      remoteRef:
        key: postgres-password
